name: APK Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: npm install

      - run: npm run sync-web

      - run: npx expo prebuild --platform android --non-interactive

      - run: chmod +x android/gradlew

      - run: ./gradlew assembleDebug
        working-directory: android

      - id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          TAG="$INPUT_TAG"
          if [ "$REF_TYPE" = "tag" ]; then TAG="$REF_NAME"; fi
          if [ -z "$TAG" ]; then TAG="v$VERSION"; fi
          APK="LightISS-$TAG-debug.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - run: mkdir -p dist && cp android/app/build/outputs/apk/debug/app-debug.apk "dist/${{ steps.meta.outputs.apk }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk }}
          path: dist/${{ steps.meta.outputs.apk }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: LightISS ${{ steps.meta.outputs.tag }}
          files: dist/${{ steps.meta.outputs.apk }}
          body: LightISS debug APK built by GitHub Actions.
